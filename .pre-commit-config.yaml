default_install_hook_types:
  - pre-commit

repos:
  - repo: local
    hooks:
      - id: uv-lock-check
        name: uv lock check
        entry: uv lock --check
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        files: ^backend/

      - id: ruff-check
        name: ruff lint
        entry: uv run ruff check --fix
        language: system
        types: [python]
        files: ^backend/

      - id: codespell
        name: codespell
        entry: uv run python -m codespell_lib
        language: system
        types_or: [python, markdown, yaml, rst, javascript]

      - id: ty-check
        name: ty type check
        entry: uv run ty check backend/webrtc_template
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false

      - id: bandit
        name: bandit security check
        entry: uv run bandit -c pyproject.toml -r
        language: system
        types: [python]
        files: ^backend/

      - id: prettier-frontend
        name: prettier (frontend)
        entry: npm --prefix frontend run format:check
        language: system
        files: ^frontend/src/
        pass_filenames: false

      - id: eslint-frontend
        name: eslint (frontend)
        entry: npm --prefix frontend run lint
        language: system
        files: ^frontend/src/
        pass_filenames: false