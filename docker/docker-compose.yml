name: webrtc-template

services:
  signaling:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: .env
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      - coturn
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ice-servers || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 6s

  coturn:
    image: coturn/coturn:latest
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - signaling
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
